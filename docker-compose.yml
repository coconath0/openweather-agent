services:
  mcp-server:
    build: ./mcp-server
    ports:
      - "8000:8000"
    env_file:
      - ./mcp-server/.env

  agent-backend:
    build: ./agent-backend
    ports:
      - "8001:8001"
    env_file:
      - ./agent-backend/.env
    environment:
      - MCP_SERVER_URL=http://mcp-server:8000
    depends_on:
      - mcp-server

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - mcp-server
      - agent-backend
